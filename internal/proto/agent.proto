syntax = "proto3";

package deft;

option go_package = "github.com/lucasile/deft/internal/proto";

service AgentService {
  rpc Connect(stream AgentMessage) returns (stream PanelCommand) {}
}

message AgentMessage {
  string node_id = 1;
  oneof content {
    Heartbeat heartbeat = 2;
    CommandResult result = 3;
    StatsUpdate stats = 4;
    ContainerInventory inventory = 5;
    LogChunk log_chunk = 6;
  }
}

message Heartbeat {
  int64 timestamp = 1;
}

message CommandResult {
  string command_id = 1;
  bool success = 2;
  string message = 3;
}

message StatsUpdate {
  string container_id = 1;
  double cpu_percent = 2;
  uint64 memory_bytes = 3;
}

message ContainerInventory {
  repeated ContainerSummary containers = 1;
}

message ContainerSummary {
  string id = 1;
  string name = 2;
  string image = 3;
  string status = 4;
  string resource_id = 5;
}

message LogChunk {
  string stream_id = 1;
  string container_id = 2;
  bytes data = 3;
  bool eof = 4;
  string error = 5;
}

message PanelCommand {
  string command_id = 1;
  oneof action {
    CreateContainer create = 2;
    StartContainer start = 3;
    StopContainer stop = 4;
    RemoveContainer remove = 5;
    ShutdownAgent shutdown = 6;
    GetContainerLogs logs = 7;
    FollowContainerLogs follow_logs = 8;
    CancelLogStream cancel_logs = 9;
  }
}

message CreateContainer {
  string name = 1;
  string image = 2;
  string display_name = 3;
  string resource_id = 4;
  repeated PortMapping ports = 5;
  repeated EnvVar env = 6;
  repeated VolumeMount volumes = 7;
  string restart_policy = 8;
}

message PortMapping {
  uint32 host_port = 1;
  uint32 container_port = 2;
  string protocol = 3;
}

message EnvVar {
  string key = 1;
  string value = 2;
}

message VolumeMount {
  string host_path = 1;
  string container_path = 2;
  bool read_only = 3;
}

message StartContainer {
  string id = 1;
}

message StopContainer {
  string id = 1;
}

message RemoveContainer {
  string id = 1;
}

message ShutdownAgent {}

message GetContainerLogs {
  string id = 1;
  int32 tail_lines = 2;
}

message FollowContainerLogs {
  string id = 1;
  int32 tail_lines = 2;
  string stream_id = 3;
}

message CancelLogStream {
  string stream_id = 1;
}
